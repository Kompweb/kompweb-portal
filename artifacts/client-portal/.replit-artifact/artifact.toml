kind = "web"
previewPath = "/"
title = "KOMPWEB Studios Client Portal"
version = "1.0.0"
id = "artifacts/client-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25516

[services.development]
run = "pnpm --filter @workspace/client-portal run dev"

[services.production]
build = [ "sh", "-c", "BASE_PATH=/ pnpm --filter @workspace/client-portal run build && pnpm --filter @workspace/api-server run build" ]
run = [ "node", "artifacts/api-server/dist/index.mjs" ]

[services.env]
PORT = "25516"
BASE_PATH = "/"
